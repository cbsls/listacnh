<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interesse Troca Categoria CNH</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{background:#eef3f8;color:#1f2937;padding:16px}
.container{max-width:900px;margin:auto}
.topo{background:#0f4c81;color:white;padding:22px;border-radius:18px;text-align:center;margin-bottom:18px}
.topo h1{font-size:1.5rem;margin-bottom:6px}
.card{background:white;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 8px 22px rgba(0,0,0,.08)}
label{font-weight:bold;margin-top:10px;display:block}
select,input{width:100%;padding:12px;margin-top:6px;border:1px solid #cbd5e1;border-radius:10px;font-size:1rem}
button{width:100%;padding:13px;margin-top:14px;border:none;border-radius:12px;background:#0f4c81;color:white;font-weight:bold;font-size:1rem}
button.danger{background:#b91c1c}
button.green{background:#15803d}
.lista-item{border-left:5px solid #0f4c81;background:#f8fafc;padding:12px;border-radius:12px;margin-bottom:10px}
.lista-item strong{color:#0f4c81}
.vazio{text-align:center;color:#64748b;padding:20px}
.contador{background:#edf6ff;color:#0f4c81;padding:10px;border-radius:999px;text-align:center;font-weight:bold;margin-bottom:12px}
.status{font-size:.85rem;color:#64748b;text-align:center;margin-top:8px}
</style>
</head>

<body>
<div class="container">

<div class="topo">
<h1>🚘 Interesse em Troca de Categoria CNH</h1>
<p>Cadastro online dos militares interessados</p>
</div>

<div class="card">
<label>Militar</label>
<select id="militar" onchange="preencherMilitar()">
<option value="">Selecione o militar</option>
</select>

<label>Nome completo</label>
<input id="nomeCompleto" readonly>

<label>Id. Func.</label>
<input id="idFunc" readonly>

<label>Categoria atual</label>
<select id="categoriaAtual">
<option value="">Selecione</option>
<option>A</option>
<option>B</option>
<option>AB</option>
<option>C</option>
<option>D</option>
<option>E</option>
</select>

<label>Categoria pretendida</label>
<select id="categoriaPretendida">
<option value="">Selecione</option>
<option>C</option>
<option>D</option>
<option>E</option>
</select>

<label>Observação</label>
<input id="observacao" placeholder="Opcional">

<button onclick="adicionar()">💾 Salvar interesse</button>
<button class="green" onclick="gerarPDF()">📄 Gerar relatório PDF</button>
</div>

<div class="card">
<div class="contador" id="contador">Interessados: 0</div>
<div id="lista"></div>
<div class="status" id="status">Carregando dados online...</div>
</div>

</div>

<script>
const SUPABASE_URL = "https://nypebmbqcbrvbutamzrh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_VXTVVV8BENUaKIMWjhrk2w_JRNQkEvg";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const militares = [
["1º TEN MARCELO","MARCELO BANDEIRA TAVARES","2423286"],
["1º SGT VICENTE","ALESSANDRO BASTOS VICENTE","2614960"],
["1º SGT DIEFERSON","EDI DIEFERSON RIBEIRO DE VARGAS","2972719"],
["1º SGT BATISTA","JULIANO INSAURRIAGA BATISTA","2692449"],
["2º SGT ANDERSON","ANDERSON SILVA DA SILVA","2882930"],
["2º SGT VINICIUS","VINICIUS MACHADO DE MORAES","2910233"],
["2º SGT LISCANO","RAFAEL LISCANO","3698530"],
["SD TOMASCHEWSKI","MAGNO NORNBERG TOMASCHEWSKI","3218627"],
["SD CAMACHO","GABRIEL VELEDA CAMACHO","3698696"],
["SD ISQUIERDO","MARLON ISQUIERDO AZEVEDO","3697665"],
["SD BORGES","SAYMON CARLOS ARAUJO BORGES","3698440"],
["SD BATISTA","VINICIUS INSAURRIAGA BATISTA","3702847"],
["SD MAX","MAX STEVENS OLIVEIRA NUNES","3084620"],
["SD WILLIAM","WILLIAM RIBEIRO MEDEIROS","4355504"],
["SD MOTTA","CAIQUE MOTTA","4626338"],
["SD SOARES","THIAGO CHAGAS SOARES","4625595"],
["SD PEGLOW","VANDERLEI JESKE PEGLOW","4783069"],
["SD LARSSON","LARSSON FROMMING FREDES","4490380"]
];

let interessados = [];

function carregarMilitares(){
  const select = document.getElementById("militar");
  militares.forEach((m,i)=>{
    const op = document.createElement("option");
    op.value = i;
    op.textContent = m[0];
    select.appendChild(op);
  });
}

function preencherMilitar(){
  const i = militar.value;
  if(i === ""){
    nomeCompleto.value = "";
    idFunc.value = "";
    return;
  }
  nomeCompleto.value = militares[i][1];
  idFunc.value = militares[i][2];
}

async function carregarOnline(){
  status.textContent = "Sincronizando com Supabase...";

  const { data, error } = await supabaseClient
    .from("cnh_interessados")
    .select("*")
    .order("categoria_pretendida", { ascending: true })
    .order("nome_guerra", { ascending: true });

  if(error){
    console.error(error);
    status.textContent = "Erro ao carregar dados do Supabase.";
    return;
  }

  interessados = data || [];
  renderizar();
  status.textContent = "Dados atualizados online.";
}

async function adicionar(){
  const idx = militar.value;
  const atual = categoriaAtual.value;
  const pretendida = categoriaPretendida.value;

  if(idx === "" || !atual || !pretendida){
    alert("Preencha militar, categoria atual e categoria pretendida.");
    return;
  }

  const m = militares[idx];

  const registro = {
    nome_guerra: m[0],
    nome_completo: m[1],
    id_func: m[2],
    categoria_atual: atual,
    categoria_pretendida: pretendida,
    observacao: observacao.value || null,
    atualizado_em: new Date().toISOString()
  };

  const { error } = await supabaseClient
    .from("cnh_interessados")
    .upsert(registro, { onConflict: "id_func" });

  if(error){
    console.error(error);
    alert("Erro ao salvar no Supabase.");
    return;
  }

  militar.value="";
  nomeCompleto.value="";
  idFunc.value="";
  categoriaAtual.value="";
  categoriaPretendida.value="";
  observacao.value="";

  await carregarOnline();
}

async function remover(id){
  if(!confirm("Remover este interessado?")) return;

  const { error } = await supabaseClient
    .from("cnh_interessados")
    .delete()
    .eq("id", id);

  if(error){
    console.error(error);
    alert("Erro ao remover.");
    return;
  }

  await carregarOnline();
}

function renderizar(){
  contador.textContent = "Interessados: " + interessados.length;

  if(interessados.length === 0){
    lista.innerHTML = '<div class="vazio">Nenhum interessado cadastrado ainda.</div>';
    return;
  }

  lista.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${interessados.map((x,i)=>`
        <div style="
          display:grid;
          grid-template-columns: 1fr auto auto auto;
          align-items:center;
          gap:12px;
          background:#f8fafc;
          border-left:5px solid #0f4c81;
          padding:10px 12px;
          border-radius:10px;
          font-size:0.95rem;
        ">

          <div style="font-weight:700;color:#0f4c81;">
            ${i+1}. ${x.nome_guerra}
          </div>

          <div style="font-weight:600;">
            ${x.categoria_atual}
          </div>

          <div style="font-weight:700;">
            →
          </div>

          <div style="font-weight:600;">
            ${x.categoria_pretendida}
          </div>

          <button onclick="remover(${x.id})" title="Excluir" style="
            width:auto;
            margin:0;
            padding:6px 10px;
            border-radius:8px;
            background:#b91c1c;
            color:white;
          ">🗑️</button>

        </div>
      `).join("")}
    </div>
  `;
}

function gerarPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");

  const dataAtual = new Date().toLocaleDateString("pt-BR");

  // Título
  doc.setFontSize(14);
  doc.text("INTERESSADOS - TROCA DE CNH", 105, 15, { align: "center" });

  doc.setFontSize(10);
  doc.text("CB São Lourenço do Sul", 105, 21, { align: "center" });
  doc.text("Data: " + dataAtual, 14, 30);

  // Montar linhas simplificadas
  const linhas = interessados.map(x => [
    x.nome_guerra,
    `${x.categoria_atual} → ${x.categoria_pretendida}`
  ]);

  // Tabela limpa
  doc.autoTable({
    startY: 35,
    head: [["Nome de Guerra", "Troca"]],
    body: linhas,
    styles: {
      fontSize: 10,
      cellPadding: 2
    },
    headStyles: {
      fillColor: [15,76,129],
      halign: "center"
    },
    columnStyles: {
      0: { cellWidth: 100 },
      1: { halign: "center" }
    }
  });

  doc.save("interessados-cnh.pdf");
}

carregarMilitares();
carregarOnline();
</script>

</body>
</html>
